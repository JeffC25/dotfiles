set -g prefix C-Space

unbind r
bind r source-file ~/.tmux.conf

set -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

set -s extended-keys on

# Configure status bar
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g status-position top
set -g status-justify left
set -g status-style 'bg=default'

set -g window-status-current-style 'fg=black bg=green bold'
setw -g window-status-style 'fg=green bg=default'
setw -g window-status-current-format ' #I #W #F '
setw -g window-status-format ' #I #[fg=white]#W #[fg=green]#F '

set -g status-left ''
set -g status-left-length 0
set -g status-right '#(gitmux -cfg $HOME/.gitmux.conf "#{pane_current_path}")'

set -g message-style 'fg=black bg=blue bold'

set -g status 2
set -g status-format[1] ''

setw -g clock-mode-colour blue

set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g bell-action none
setw -g monitor-activity off

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.tmux/plugins/tpm/tpm'

# set vi-mode
setw -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
